<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Resume Screener</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,400&display=swap');

  :root {
    --bg: #0d0f0e;
    --surface: #141614;
    --surface2: #191b18;
    --border: #232623;
    --accent: #b5f23d;
    --accent-dim: #7aaa1f;
    --text: #e8ece0;
    --muted: #6b7060;
    --strong: #c7f768;
    --moderate: #f5c842;
    --notfit: #f26b5b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 28px 24px;
    font-size: 13px;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 28px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 18px;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 1.9rem;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .badge {
    font-size: 0.6rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2.5px;
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 2px;
  }

  /* API URL bar */
  .api-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 14px;
  }

  .api-bar label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    white-space: nowrap;
  }

  .api-bar input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    outline: none;
  }

  /* Layout */
  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 18px;
  }

  .panel-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 10px;
  }

  textarea#jd {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.76rem;
    resize: vertical;
    outline: none;
    line-height: 1.75;
    min-height: 180px;
  }

  /* Drop zone */
  .drop-zone {
    border: 1.5px dashed var(--border);
    border-radius: 4px;
    padding: 24px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    margin-bottom: 12px;
  }

  .drop-zone.dragover {
    border-color: var(--accent-dim);
    background: rgba(181,242,61,0.04);
  }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-icon { font-size: 1.6rem; display: block; margin-bottom: 6px; opacity: 0.5; }
  .drop-text { color: var(--muted); font-size: 0.7rem; line-height: 1.8; }
  .drop-text em { color: var(--accent-dim); font-style: normal; }

  /* File chips */
  .file-list { display: flex; flex-direction: column; gap: 6px; }

  .file-chip {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 7px 10px;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }

  .file-chip-name { font-size: 0.72rem; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-chip-size { font-size: 0.62rem; color: var(--muted); margin: 0 10px; }
  .file-chip-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.9rem; transition: color 0.15s; line-height: 1; }
  .file-chip-remove:hover { color: var(--notfit); }

  .file-type-pdf  { border-left: 3px solid #f26b5b; }
  .file-type-docx { border-left: 3px solid #5b9af2; }
  .file-type-txt  { border-left: 3px solid var(--muted); }

  /* Run button */
  .run-btn {
    width: 100%;
    background: var(--accent);
    color: #0d0f0e;
    border: none;
    font-family: 'Fraunces', serif;
    font-size: 1.05rem;
    font-weight: 700;
    padding: 13px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-bottom: 18px;
    letter-spacing: 0.3px;
  }
  .run-btn:hover:not(:disabled) { background: var(--strong); }
  .run-btn:active:not(:disabled) { transform: scale(0.99); }
  .run-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

  /* Error */
  .error-msg {
    background: rgba(242,107,91,0.08);
    border: 1px solid rgba(242,107,91,0.2);
    color: var(--notfit);
    padding: 12px 16px;
    border-radius: 4px;
    font-size: 0.74rem;
    margin-bottom: 14px;
    line-height: 1.6;
  }

  /* Results */
  .results-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
  }

  .results-header h2 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 1rem;
    color: var(--accent);
  }

  .result-count { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; }

  table { width: 100%; border-collapse: collapse; font-size: 0.73rem; }

  thead th {
    text-align: left;
    padding: 9px 14px;
    font-size: 0.58rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    font-weight: 500;
  }

  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(181,242,61,0.025); }

  td { padding: 13px 14px; vertical-align: top; line-height: 1.5; }

  .candidate-name { font-family: 'Fraunces', serif; font-size: 0.95rem; font-weight: 300; color: var(--text); }
  .rank-badge { font-size: 0.58rem; color: var(--muted); letter-spacing: 1px; }

  .score-ring { position: relative; width: 46px; height: 46px; }
  .score-ring svg { position: absolute; top: 0; left: 0; }
  .score-ring .score-num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 500; }

  .chip-list { display: flex; flex-direction: column; gap: 3px; }
  .chip { font-size: 0.65rem; padding: 2px 6px; border-radius: 2px; display: inline-block; line-height: 1.5; }
  .chip-green { background: rgba(181,242,61,0.08); color: var(--accent); border: 1px solid rgba(181,242,61,0.14); }
  .chip-red   { background: rgba(242,107,91,0.08); color: var(--notfit); border: 1px solid rgba(242,107,91,0.14); }

  .rec-badge { font-size: 0.65rem; font-weight: 500; padding: 4px 9px; border-radius: 2px; display: inline-block; letter-spacing: 0.5px; text-transform: uppercase; }
  .rec-strong   { background: rgba(181,242,61,0.1); color: var(--accent); border: 1px solid rgba(181,242,61,0.18); }
  .rec-moderate { background: rgba(245,200,66,0.1); color: var(--moderate); border: 1px solid rgba(245,200,66,0.18); }
  .rec-notfit   { background: rgba(242,107,91,0.1); color: var(--notfit); border: 1px solid rgba(242,107,91,0.18); }

  .loading-msg { text-align: center; padding: 40px; color: var(--muted); font-size: 0.75rem; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state { text-align: center; padding: 44px; color: var(--muted); font-size: 0.73rem; line-height: 2; }
  .empty-state .icon { font-size: 1.8rem; display: block; margin-bottom: 10px; opacity: 0.35; }

  .warn-list { margin-top: 10px; padding: 10px 14px; border-left: 2px solid var(--moderate); font-size: 0.68rem; color: var(--moderate); background: rgba(245,200,66,0.05); }
</style>
</head>
<body>

<header>
  <h1>Resume Screener</h1>
  <span class="badge">FastAPI + Groq AI</span>
</header>

<!-- API URL config -->
<div class="api-bar">
  <label>Backend URL</label>
  <input type="text" id="api-url" value="" placeholder="(current origin)">
</div>

<div class="layout">
  <!-- Left: Job Description -->
  <div class="panel">
    <div class="panel-label">Job Description</div>
    <textarea id="jd" placeholder="Paste the job description — role, required skills, qualifications, responsibilities..."></textarea>
  </div>

  <!-- Right: Resume uploads -->
  <div class="panel">
    <div class="panel-label">Upload Resumes</div>
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" multiple accept=".pdf,.docx,.txt" onchange="handleFiles(this.files)">
      <span class="drop-icon">📄</span>
      <div class="drop-text">
        Drag & drop files here or <em>click to browse</em><br>
        Supports PDF, DOCX, TXT
      </div>
    </div>
    <div class="file-list" id="file-list"></div>
  </div>
</div>

<div id="error-area"></div>
<button class="run-btn" id="run-btn" onclick="runScreening()">⚡ Screen Candidates</button>

<div class="results-panel" id="results-panel">
  <div class="results-header">
    <h2>Screening Results</h2>
    <span class="result-count" id="result-count">—</span>
  </div>
  <div id="results-body">
    <div class="empty-state">
      <span class="icon">🗂</span>
      Enter a job description and upload at least one resume,<br>then click Screen Candidates.
    </div>
  </div>
</div>

<script>
  let files = [];

  // Drag & drop
  const dz = document.getElementById('drop-zone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
  dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });

  function humanSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1024 / 1024).toFixed(1) + ' MB';
  }

  function fileTypeClass(name) {
    if (name.endsWith('.pdf')) return 'file-type-pdf';
    if (name.endsWith('.docx')) return 'file-type-docx';
    return 'file-type-txt';
  }

  function handleFiles(incoming) {
    for (const f of incoming) {
      if (!files.find(x => x.name === f.name && x.size === f.size)) {
        files.push(f);
      }
    }
    renderFileList();
  }

  function removeFile(i) {
    files.splice(i, 1);
    renderFileList();
  }

  function renderFileList() {
    const list = document.getElementById('file-list');
    list.innerHTML = files.map((f, i) => `
      <div class="file-chip ${fileTypeClass(f.name)}">
        <span class="file-chip-name">${f.name}</span>
        <span class="file-chip-size">${humanSize(f.size)}</span>
        <button class="file-chip-remove" onclick="removeFile(${i})">✕</button>
      </div>
    `).join('');
  }

  // Score ring SVG
  function drawRing(score) {
    const r = 19, cx = 23, cy = 23, circ = 2 * Math.PI * r;
    const dash = (score / 100) * circ;
    const col = score >= 75 ? '#b5f23d' : score >= 55 ? '#f5c842' : '#f26b5b';
    return `<div class="score-ring">
      <svg width="46" height="46" viewBox="0 0 46 46">
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#232623" stroke-width="3"/>
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${col}" stroke-width="3"
          stroke-dasharray="${dash} ${circ}" stroke-dashoffset="${circ/4}"
          stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"/>
      </svg>
      <div class="score-num" style="color:${col}">${score}</div>
    </div>`;
  }

  function recClass(rec) {
    if (rec.toLowerCase().includes('strong')) return 'rec-strong';
    if (rec.toLowerCase().includes('moderate')) return 'rec-moderate';
    return 'rec-notfit';
  }

  function renderTable(candidates, warnings) {
    const rows = candidates.map(c => `
      <tr>
        <td>
          <div class="candidate-name">${c.name.replace(/\.[^.]+$/, '')}</div>
          <div class="rank-badge">#${c.rank} ranked</div>
        </td>
        <td>${drawRing(c.score)}</td>
        <td><div class="chip-list">${(c.strengths||[]).map(s=>`<span class="chip chip-green">✓ ${s}</span>`).join('')}</div></td>
        <td><div class="chip-list">${(c.gaps||[]).map(g=>`<span class="chip chip-red">✗ ${g}</span>`).join('')}</div></td>
        <td><span class="rec-badge ${recClass(c.recommendation)}">${c.recommendation}</span></td>
      </tr>`).join('');

    const warnHtml = warnings?.length
      ? `<div class="warn-list">⚠ Skipped: ${warnings.join(' | ')}</div>` : '';

    return `<table>
      <thead><tr>
        <th>Candidate</th><th>Score</th><th>Strengths</th><th>Gaps</th><th>Recommendation</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>${warnHtml}`;
  }

  async function runScreening() {
    const jd = document.getElementById('jd').value.trim();
    let apiUrl = document.getElementById('api-url').value.trim().replace(/\/$/, '');
    if (!apiUrl) apiUrl = window.location.origin;
    const errArea = document.getElementById('error-area');
    errArea.innerHTML = '';

    if (!jd) { errArea.innerHTML = `<div class="error-msg">Please enter a job description.</div>`; return; }
    if (!files.length) { errArea.innerHTML = `<div class="error-msg">Please upload at least one resume file.</div>`; return; }

    const btn = document.getElementById('run-btn');
    btn.disabled = true;
    btn.textContent = 'Sending to backend…';
    document.getElementById('results-body').innerHTML = `<div class="loading-msg"><span class="spinner"></span>Extracting text & screening ${files.length} resume${files.length>1?'s':''}…</div>`;
    document.getElementById('result-count').textContent = '—';

    const form = new FormData();
    form.append('jd', jd);
    files.forEach(f => form.append('resumes', f));

    try {
      const res = await fetch(`${apiUrl}/screen`, { method: 'POST', body: form });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);

      document.getElementById('result-count').textContent = `${data.total} candidate${data.total!==1?'s':''} screened`;
      document.getElementById('results-body').innerHTML = renderTable(data.candidates, data.parse_errors);
    } catch (err) {
      document.getElementById('results-body').innerHTML = `<div class="empty-state" style="color:var(--notfit)">⚠ ${err.message}</div>`;
      errArea.innerHTML = `<div class="error-msg">Error: ${err.message}<br><small>Is the backend running at ${apiUrl}?</small></div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = '⚡ Screen Candidates';
    }
  }
</script>
</body>
</html>
